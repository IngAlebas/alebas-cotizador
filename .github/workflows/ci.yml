name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run build 2>&1 | grep -E "error|warning" || true
      - name: Build
        run: npm run build
        env:
          REACT_APP_N8N_BASE_URL: https://api.solar-hub.co/webhook
          CI: false
      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true
