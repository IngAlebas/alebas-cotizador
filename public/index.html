<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF8C00" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SolarHub" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="shortcut icon" href="/icons/icon-32.png" />

    <!-- Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Tema oscuro: Safari/Chrome adoptan el color de fondo durante carga inicial -->
    <meta name="color-scheme" content="dark" />
    <!-- Evita que iOS auto-detecte y linkee números/correos en texto plano (rompe diseño) -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <!-- HandheldFriendly antiguo (legacy iOS/Android) -->
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="320" />

    <!-- SEO -->
    <meta name="description" content="El ecosistema solar de Colombia. Cotiza tu sistema fotovoltaico, conecta con instaladores certificados RETIE y proveedores mayoristas." />
    <meta name="keywords" content="energia solar, paneles solares, cotizador solar, Colombia, RETIE, fotovoltaico, instaladores" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://solar-hub.co" />

    <!-- Open Graph -->
    <meta property="og:title" content="SolarHub — El ecosistema solar de Colombia" />
    <meta property="og:description" content="Cotiza, conecta e instala tu sistema solar fotovoltaico." />
    <meta property="og:image" content="https://solar-hub.co/icons/icon-512.png" />
    <meta property="og:url" content="https://solar-hub.co" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SolarHub Colombia" />
    <meta name="twitter:description" content="El ecosistema solar de Colombia" />
    <meta name="twitter:image" content="https://solar-hub.co/icons/icon-192.png" />

    <!-- Windows tile -->
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta name="msapplication-TileColor" content="#FF8C00" />

    <title>SolarHub | El ecosistema solar de Colombia</title>
  </head>
  <body>
    <noscript>Necesitas JavaScript para usar esta aplicación.</noscript>
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then(reg => console.log('SolarHub SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
