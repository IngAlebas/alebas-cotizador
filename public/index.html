<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF8C00" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SolarHub" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="shortcut icon" href="/icons/icon-32.png" />

    <!-- Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Tema oscuro: Safari/Chrome adoptan el color de fondo durante carga inicial -->
    <meta name="color-scheme" content="dark" />
    <!-- Evita que iOS auto-detecte y linkee números/correos en texto plano (rompe diseño) -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <!-- HandheldFriendly antiguo (legacy iOS/Android) -->
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="320" />

    <!-- SEO -->
    <meta name="description" content="El ecosistema solar de Colombia. Cotiza tu sistema fotovoltaico, conecta con instaladores certificados RETIE y proveedores mayoristas." />
    <meta name="keywords" content="energia solar, paneles solares, cotizador solar, Colombia, RETIE, fotovoltaico, instaladores" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://solar-hub.co" />

    <!-- Open Graph -->
    <meta property="og:title" content="SolarHub — El ecosistema solar de Colombia" />
    <meta property="og:description" content="Cotiza, conecta e instala tu sistema solar fotovoltaico." />
    <meta property="og:image" content="https://solar-hub.co/icons/icon-512.png" />
    <meta property="og:url" content="https://solar-hub.co" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SolarHub Colombia" />
    <meta name="twitter:description" content="El ecosistema solar de Colombia" />
    <meta name="twitter:image" content="https://solar-hub.co/icons/icon-192.png" />

    <!-- Windows tile -->
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta name="msapplication-TileColor" content="#FF8C00" />

    <title>SolarHub | El ecosistema solar de Colombia</title>
    <!-- Splash screen visible mientras React monta — animación pulse + raypin
         del logo SolarHub. Se desvanece automáticamente cuando #root tiene contenido. -->
    <style>
      .sh-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #07090F;
        transition: opacity .4s ease .1s, visibility .4s;
      }
      .sh-splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
      .sh-splash svg { animation: shPulse 2s ease-in-out infinite; }
      .sh-splash .ray { transform-origin: 32px 32px; animation: shSpin 8s linear infinite; }
      .sh-splash-text {
        margin-top: 20px; color: #E8F0F7; font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px; letter-spacing: 3px; font-weight: 600; opacity: 0.8;
      }
      .sh-splash-tag {
        margin-top: 6px; color: #FF8C00; font-family: system-ui, -apple-system, sans-serif;
        font-size: 10px; letter-spacing: 4px; text-transform: uppercase; font-weight: 700;
      }
      .sh-splash-loader {
        margin-top: 28px; width: 60px; height: 3px; background: rgba(255,140,0,0.18);
        border-radius: 3px; overflow: hidden; position: relative;
      }
      .sh-splash-loader::after {
        content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 30%;
        background: linear-gradient(90deg, transparent, #FF8C00, transparent);
        animation: shLoader 1.4s ease-in-out infinite;
      }
      @keyframes shPulse {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 14px rgba(255,140,0,0.4)); }
        50%      { transform: scale(1.06); filter: drop-shadow(0 0 26px rgba(255,140,0,0.7)); }
      }
      @keyframes shSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes shLoader { 0% { left: -30%; } 100% { left: 100%; } }
      [data-theme="light"] .sh-splash { background: #F5F7FA; }
      [data-theme="light"] .sh-splash-text { color: #0F172A; }
    </style>
  </head>
  <body>
    <noscript>Necesitas JavaScript para usar esta aplicación.</noscript>
    <div id="splash" class="sh-splash">
      <svg viewBox="0 0 64 64" width="78" height="78" aria-hidden="true">
        <circle cx="32" cy="32" r="11" fill="#FF8C00" />
        <g class="ray" stroke="#FF8C00" stroke-width="3" stroke-linecap="round">
          <line x1="32" y1="14" x2="32" y2="6" />
          <line x1="32" y1="50" x2="32" y2="58" />
          <line x1="14" y1="32" x2="6" y2="32" />
          <line x1="50" y1="32" x2="58" y2="32" />
          <line x1="19" y1="19" x2="13" y2="13" />
          <line x1="45" y1="45" x2="51" y2="51" />
          <line x1="45" y1="19" x2="51" y2="13" />
          <line x1="19" y1="45" x2="13" y2="51" />
        </g>
        <circle cx="32" cy="6" r="3" fill="#FFB800" />
        <circle cx="32" cy="58" r="3" fill="#FFD93D" />
        <circle cx="6" cy="32" r="3" fill="#FFB800" />
        <circle cx="58" cy="32" r="3" fill="#FFB800" />
      </svg>
      <div class="sh-splash-text">SOLARHUB</div>
      <div class="sh-splash-loader"></div>
    </div>
    <div id="root"></div>
    <script>
      // Aplicar tema antes de mostrar splash para que coincida con la preferencia.
      try {
        var stored = localStorage.getItem('al:sh:theme');
        if (stored) {
          var v = JSON.parse(stored).value;
          if (v === 'light' || (v === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      } catch (_) {}
      // Splash con MINIMUM display time para que la animación sea visible
      // SIEMPRE al abrir la app — incluso si React monta instantáneamente con
      // bundle cacheado (Android PWA típico). Sin esto el splash flasheaba en
      // <100ms y el usuario no veía la animación.
      //
      // 4 triggers:
      //   1. MIN_DISPLAY_MS = 1500ms — la animación se ve siempre 1.5s
      //   2. React monta (#root tiene hijos) → marca ready, espera al MIN
      //   3. Failsafe a 6s — force-hide aunque React no monte
      //   4. Tap del usuario después del MIN → escape hatch
      var splashRemoved = false;
      var splashStartedAt = Date.now();
      var MIN_DISPLAY_MS = 1500;
      var reactReady = false;
      var splashRemove = function () {
        if (splashRemoved) return;
        splashRemoved = true;
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hide');
          setTimeout(function () { try { s.parentNode && s.parentNode.removeChild(s); } catch (_) {} }, 500);
        }
      };
      var maybeRemove = function () {
        if (splashRemoved || !reactReady) return;
        var elapsed = Date.now() - splashStartedAt;
        if (elapsed >= MIN_DISPLAY_MS) splashRemove();
        else setTimeout(splashRemove, MIN_DISPLAY_MS - elapsed);
      };
      var splashCheck = function () {
        if (splashRemoved || reactReady) return;
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          reactReady = true;
          maybeRemove();
        } else setTimeout(splashCheck, 80);
      };
      // Comenzar polling
      setTimeout(splashCheck, 80);
      // Failsafe a 6s (más tiempo para apreciar animación si React falla)
      setTimeout(splashRemove, 6000);
      // Tap escape — solo después de 700ms para no saltar la animación
      var splashEl = document.getElementById('splash');
      if (splashEl) splashEl.addEventListener('click', function () {
        if (Date.now() - splashStartedAt >= 700) splashRemove();
      });
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            // KILL-SWITCH: si la versión almacenada no coincide con la actual,
            // desregistrar TODOS los SW existentes y borrar TODAS las caches
            // antes de re-registrar. Esto resuelve PWAs atoradas con bundles
            // cacheados desde versiones previas (ej. solarhub-v1).
            const SW_VERSION = 'v7-2026-04-30-shading';
            const stored = localStorage.getItem('sh:sw:v');
            if (stored !== SW_VERSION) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(r => r.unregister()));
              if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(k => caches.delete(k)));
              }
              localStorage.setItem('sh:sw:v', SW_VERSION);
              console.log('SolarHub SW: cleared old caches and registrations');
            }
            const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
            console.log('SolarHub SW registered:', reg.scope);
          } catch (err) {
            console.warn('SW registration failed:', err);
          }
        });
      }
    </script>
  </body>
</html>
